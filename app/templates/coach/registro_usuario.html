<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Usuario – Arath Labs</title>
    <style>
        body { background:#0f0f0f; color:#e6e6e6; font-family:Arial; padding:30px; }
        .card { background:#1a1a1a; padding:30px; border-radius:12px; border:1px solid #333; max-width:500px; margin:auto; }
        h2 { color: #00d4ff; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #333; background:#0f0f0f; color:white; box-sizing: border-box; }
        button { margin-top:25px; padding:12px; width:100%; background:#00d4ff; border:none; border-radius:8px; font-weight:bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #00b8e6; }
        .back { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Registrar Nuevo Usuario</h2>
        <form method="POST">
            <label>Nombre Completo</label>
            <input type="text" name="nombre" required placeholder="Ej. Juan Pérez">

            <label>Correo Electrónico</label>
            <input type="email" name="correo" required placeholder="juan@ejemplo.com">

            <label>Contraseña Temporary</label>
            <input type="password" name="password" required>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Sexo</label>
                    <select name="sexo">
                        <option value="M">Masculino</option>
                        <option value="F">Femenino</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Edad</label>
                    <input type="number" name="edad" required>
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Peso (kg)</label>
                    <input type="number" step="0.1" name="peso" required>
                </div>
                <div style="flex: 1;">
                    <label>Altura (cm)</label>
                    <input type="number" step="0.1" name="altura" required>
                </div>
            </div>

            <label>Teléfono</label>
            <input type="text" name="telefono" placeholder="Ej. 1234567890">

            <button type="submit">Crear Usuario</button>
        </form>
        <a href="/mis_clientes" class="back">← Volver a Mis Clientes</a>
    </div>
</body>
</html>

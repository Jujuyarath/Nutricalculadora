<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Rutinas – Arath Labs</title>
    <style>
        body { background:#0f0f0f; color:#e6e6e6; font-family:Arial; padding:30px; }
        .card { background:#1a1a1a; padding:20px; border-radius:12px; border:1px solid #333; margin:auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .rutina-card { background:#111; padding:20px; border-radius:10px; border:1px solid #333; position: relative; }
        .rutina-card h3 { margin-top:0; color:#00d4ff; }
        .rutina-card p { font-size:14px; color:#aaa; }
        .btn { display:inline-block; margin-top:10px; padding:8px 15px; border-radius:6px; text-decoration:none; font-weight:bold; }
        .btn-edit { background:#00d4ff; color:black; }
        .new-btn { background:#00d4ff; color:black; padding:10px 20px; font-size:16px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Mis Rutinas</h2>
            <a href="/crear_rutina" class="btn new-btn">+ Nueva Rutina</a>
        </div>

        <div class="grid">
            {% for r in rutinas %}
            <div class="rutina-card">
                <h3>{{ r[1] }}</h3>
                <p>{{ r[2] if r[2] else 'Sin objetivo definido' }}</p>
                <small style="color:#555;">Creada: {{ r[3] }}</small>
                <br>
                <a href="/editar_rutina/{{ r[0] }}" class="btn btn-edit">Editar Ejercicios</a>
            </div>
            {% else %}
            <p style="color:#666;">Aún no has creado ninguna rutina.</p>
            {% endfor %}
        </div>
        
        <a href="/panel" style="display:block; margin-top:20px; color:#888; text-decoration:none;">← Volver al Panel</a>
    </div>
</body>
</html>
